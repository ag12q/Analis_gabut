<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analis Gabut</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 50px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: #333;
            background: linear-gradient(135deg, #e0f7fa 0%, #ffffff 100%);
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 188, 212, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 188, 212, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            background-position: center;
            z-index: -1;
            opacity: 0.5;
        }

        .profile-container {
            text-align: center;
            margin-bottom: 40px;
            z-index: 1;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #fff;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            margin: 0 auto 20px auto;
            display: block;
        }

        .name {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            margin: 0 0 5px 0;
            color: #1a1a1a;
        }

        .bio {
            font-size: 0.9rem;
            color: #00acc1;
            font-weight: 300;
            margin: 0;
            letter-spacing: 1px;
        }

        .links-container {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 1;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            padding: 16px;
            background-color: rgba(255, 255, 255, 0.9);
            color: #333;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 400;
            font-size: 1rem;
            border: 1px solid rgba(0, 172, 193, 0.3);
            transition: all 0.3s ease;
            box-sizing: border-box;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        .link-btn img {
            width: 20px;
            height: 20px;
            position: absolute;
            left: 20px;
            opacity: 0.7;
        }

        .link-btn:hover {
            transform: translateY(-3px);
            background-color: #ffffff;
            border-color: rgba(0, 172, 193, 0.6);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1), 0 0 15px rgba(0, 172, 193, 0.4);
            color: #00acc1;
        }

        .link-btn:hover img {
            opacity: 1;
        }

        .footer {
            margin-top: 60px;
            font-size: 0.8rem;
            color: #888;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <img src="ag.png" alt="Logo Analis Gabut" class="profile-img">
        <h1 class="name">Analis Gabut</h1>
        <p class="bio">Kreator Digital | Analis</p>
    </div>

    <div class="links-container">
        <a href="https://www.youtube.com/@Analisgabut" class="link-btn" target="_blank">
            <img src="https://cdn-icons-png.flaticon.com/512/174/174883.png" alt="YouTube">
            YouTube
        </a>

        <a href="https://web.facebook.com/analisgabut" class="link-btn" target="_blank">
            <img src="https://cdn-icons-png.flaticon.com/512/124/124010.png" alt="Facebook">
            Facebook Page
        </a>

        <a href="https://www.instagram.com/analis_gabut" class="link-btn" target="_blank">
            <img src="https://cdn-icons-png.flaticon.com/512/174/174855.png" alt="Instagram">
            Instagram
        </a>

        <a href="https://www.threads.com/@analis_gabut" class="link-btn" target="_blank">
            <img src="https://cdn-icons-png.flaticon.com/512/11260/11260225.png" alt="Threads">
            Threads
        </a>
        
        <a href="https://www.tiktok.com/@analis_gabut" class="link-btn" target="_blank">
            <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png" alt="TikTok">
            TikTok
        </a>
        
    </div>

    <div class="footer">
        © 2026 Analis Gabut. All rights reserved.
    </div>

</body>
</html>
